<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LUK命中率 計算式比較</title>
<style>
  body { margin: 0; background: #1e1e2e; font-family: "Segoe UI", sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .card { background: #2a2a3e; border-radius: 16px; padding: 32px 36px; width: 760px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  h2 { color: #e2e8f0; margin: 0 0 4px; font-size: 18px; }
  .sub { color: #94a3b8; font-size: 13px; margin: 0 0 24px; }
  canvas { display: block; }
  .legend { display: flex; gap: 24px; margin-top: 16px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #cbd5e1; }
  .legend-dot { width: 28px; height: 3px; border-radius: 2px; }
  .legend-circle { width: 10px; height: 10px; border-radius: 50%; border: 2px solid #f59e0b; background: transparent; flex-shrink: 0; }
  .formula { background: #1a1a2e; border-radius: 8px; padding: 12px 16px; margin-top: 16px; font-family: monospace; font-size: 12px; color: #a5b4fc; line-height: 1.8; }
</style>
</head>
<body>
<div class="card">
  <h2>LUK 命中率 — 計算式比較</h2>
  <p class="sub">attackerLUK / defenderLUK (ratio) ごとの命中率</p>
  <canvas id="c" width="700" height="380"></canvas>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div>新式（ヒル関数）</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f87171;opacity:0.7"></div>旧式（線形補間）</div>
    <div class="legend-item"><div class="legend-circle"></div>実測値</div>
  </div>
  <div class="formula">
    新式: f(ratio) = ratio⁵ / (ratio⁵ + 0.529⁵) &nbsp;→&nbsp; K=0.529 で実測フィット<br>
    旧式: ratio &lt; 0.5 → 1%　　0.5〜1.0 → 線形　　≥ 1.0 → 100%
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const PAD = { top: 20, right: 30, bottom: 50, left: 56 };
const PW = W - PAD.left - PAD.right;
const PH = H - PAD.top - PAD.bottom;

const K5 = Math.pow(0.529, 5);
function hillFn(r) { const r5 = Math.pow(r, 5); return r5 / (r5 + K5) * 100; }
function oldFn(r) {
  if (r < 0.5) return 1;
  if (r >= 1.0) return 100;
  return 1 + ((r - 0.5) / 0.5) * 99;
}

const XMAX = 2.5, YMAX = 100;
function tx(r) { return PAD.left + (r / XMAX) * PW; }
function ty(pct) { return PAD.top + PH - (pct / YMAX) * PH; }

// grid
ctx.strokeStyle = '#333355';
ctx.lineWidth = 1;
[0, 20, 40, 60, 80, 100].forEach(y => {
  ctx.beginPath(); ctx.moveTo(PAD.left, ty(y)); ctx.lineTo(PAD.left + PW, ty(y)); ctx.stroke();
});
[0, 0.5, 1.0, 1.5, 2.0, 2.5].forEach(x => {
  ctx.beginPath(); ctx.moveTo(tx(x), PAD.top); ctx.lineTo(tx(x), PAD.top + PH); ctx.stroke();
});

// axis labels
ctx.fillStyle = '#64748b';
ctx.font = '12px Segoe UI';
ctx.textAlign = 'right';
[0, 20, 40, 60, 80, 100].forEach(y => {
  ctx.fillText(y + '%', PAD.left - 8, ty(y) + 4);
});
ctx.textAlign = 'center';
[0, 0.5, 1.0, 1.5, 2.0, 2.5].forEach(x => {
  ctx.fillText(x.toFixed(1), tx(x), PAD.top + PH + 18);
});
ctx.fillStyle = '#94a3b8';
ctx.font = '13px Segoe UI';
ctx.fillText('ratio (攻撃側LUK / 防御側LUK)', PAD.left + PW / 2, H - 4);
ctx.save(); ctx.translate(14, PAD.top + PH / 2); ctx.rotate(-Math.PI/2);
ctx.textAlign = 'center'; ctx.fillText('命中率 (%)', 0, 0); ctx.restore();

// ratio=1 annotation
ctx.strokeStyle = '#475569'; ctx.setLineDash([4,4]); ctx.lineWidth = 1;
ctx.beginPath(); ctx.moveTo(tx(1), PAD.top); ctx.lineTo(tx(1), PAD.top + PH); ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle = '#475569'; ctx.font = '11px Segoe UI'; ctx.textAlign = 'center';
ctx.fillText('同LUK', tx(1), PAD.top - 4);

// old formula line
ctx.beginPath(); ctx.strokeStyle = 'rgba(248,113,113,0.65)'; ctx.lineWidth = 2.5; ctx.setLineDash([6,4]);
const steps = 400;
for (let i = 0; i <= steps; i++) {
  const r = (i / steps) * XMAX;
  const y = oldFn(r);
  i === 0 ? ctx.moveTo(tx(r), ty(y)) : ctx.lineTo(tx(r), ty(y));
}
ctx.stroke(); ctx.setLineDash([]);

// new formula line
ctx.beginPath(); ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 3;
for (let i = 0; i <= steps; i++) {
  const r = (i / steps) * XMAX;
  const y = hillFn(r);
  i === 0 ? ctx.moveTo(tx(r), ty(y)) : ctx.lineTo(tx(r), ty(y));
}
ctx.stroke();

// measured data points
const measured = [
  [0.25, 1.3], [0.333, 2.6], [0.36, 8.2], [0.4, 14.3], [0.5, 41.7], [1.0, 95.7], [2.0, 100], [4.0, 100]
].filter(([r]) => r <= XMAX);

measured.forEach(([r, pct]) => {
  ctx.beginPath();
  ctx.arc(tx(r), ty(pct), 5, 0, Math.PI * 2);
  ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#1e1e2e'; ctx.fill();
});
</script>
</body>
</html>
