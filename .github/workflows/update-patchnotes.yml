name: Update Patch Notes

on:
  push:
    branches: [main]
    paths-ignore:
      - 'src/data/patchNotes.ts'  # このファイルの変更では再トリガーしない
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git log を全件取得するため
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate patch notes
        run: npm run gen:patchnotes

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/patchNotes.ts
          git diff --staged --quiet || git commit -m "chore: パッチノート自動更新"
          git push
