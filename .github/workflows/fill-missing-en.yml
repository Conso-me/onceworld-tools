name: Fill Missing English Translations

on:
  push:
    branches: [main]
    paths:
      - 'src/data/enemyPresets.ts'
      - 'docs/data/accessories.json'

jobs:
  fill-en:
    runs-on: ubuntu-latest
    # ワークフロー自身のコミットで再トリガーしない
    if: "!contains(github.event.head_commit.message, '[skip i18n]')"
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PATCH_NOTES_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fill missing English translations
        run: npm run fill-en
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # gh CLI の認証に使用（Issue 作成・ラベル作成）
          GH_TOKEN: ${{ secrets.PATCH_NOTES_PAT }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/enemyPresets.ts docs/data/accessories.json
          git diff --staged --quiet || git commit -m "chore: 機械翻訳で英語訳を自動補完 [skip i18n]"
          git push
