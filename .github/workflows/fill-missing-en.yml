name: Fill Missing English Translations

on:
  push:
    branches: [main]
    paths:
      - 'src/data/enemyPresets.ts'
      - 'docs/data/accessories.json'

jobs:
  fill-en:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fill missing English translations
        run: npm run fill-en
        env:
          # gh CLI の認証に使用（Issue 作成・ラベル作成）
          GH_TOKEN: ${{ secrets.PATCH_NOTES_PAT }}

